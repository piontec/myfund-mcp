name: Release

on:
  push:
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary: myfund-mcp
            asset_name: myfund-mcp-linux-x86_64

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            binary: myfund-mcp
            asset_name: myfund-mcp-linux-aarch64
            apt_packages: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc

          - target: x86_64-apple-darwin
            runner: macos-latest
            binary: myfund-mcp
            asset_name: myfund-mcp-darwin-x86_64

          - target: aarch64-apple-darwin
            runner: macos-latest
            binary: myfund-mcp
            asset_name: myfund-mcp-darwin-aarch64

          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary: myfund-mcp.exe
            asset_name: myfund-mcp-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 -c "
          import re, sys
          content = open('Cargo.toml').read()
          content = re.sub(r'^version = \"[^\"]*\"', 'version = \"${VERSION}\"', content, count=1, flags=re.MULTILINE)
          open('Cargo.toml', 'w').write(content)
          "

      - name: Install cross-compilation tools
        if: matrix.apt_packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Configure cross-linker
        if: matrix.linker != ''
        run: |
          mkdir -p .cargo
          printf '[target.${{ matrix.target }}]\nlinker = "${{ matrix.linker }}"\n' >> .cargo/config.toml

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          # Strip leading 'v' from tag to match CHANGELOG section header (e.g. v1.2.3 → 1.2.3)
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the block between ## [VERSION] and the next ## [ header (exclusive)
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="No changelog entry found for version $VERSION."
          fi
          # Write to a file to preserve newlines
          echo "$NOTES" > release_notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: artifacts/*
